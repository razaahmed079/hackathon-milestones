<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Resume Maker</title>
</head>
<body>
    <div class="container-wrapper">
        <div class="container-info">
            <h1>Static Resume Bulider</h1>

            <section class="personal information">
                <h2>Personal Information</h2>

                <label for="profile-picture">Upload Profile Picture:</label>
                <input type="file" id="profile-picture" accept="image/*">
                <div id="profile-picture-preview">
                    <img id="preview-img" src="" alt="Profile Picture Preview" style="display: none; max-width: 150px; max-height: 150px;">
                </div>
        
                <label for="name">Full Name:</label>
                <input type="text" id="name" placeholder="Enter your Fullname">
        
                <label for="email">Email Address:</label>
                <input type="email" id="email" placeholder="Enter your Email Address">
        
                <label for="number">Contact Number:</label>
                <input type="number" id="number" placeholder="Enter your Contact Number">
        
                <label for="city">Select Your City:</label>
                <div>
                    <input type="radio" id="karachi" name="city" value="Karachi">
                    <label for="karachi">Karachi</label>
                </div>
                <div>
                    <input type="radio" id="lahore" name="city" value="Lahore">
                    <label for="lahore">Lahore</label>
                </div>
                <div>
                    <input type="radio" id="islamabad" name="city" value="Islamabad">
                    <label for="islamabad">Islamabad</label>
                </div>
                <div>
                    <input type="radio" id="punjab" name="city" value="Punjab">
                    <label for="punjab">Punjab</label>
                </div>
            </section>
        </div>

        <div class="container-skills">
            <section id="skills-section">
                <h2>Skills</h2>
                <div id="skills-content">
                    <label for="Skills">List Your Skills:</label>
                    <input type="text" id="Skills" placeholder="Enter your skills separated by commas">
                </div>
                <button class="toggle-button" onclick="toggleSkills()">Hide Skills</button>
            </section>
        </div>

        <div class="container-edu">
            <section id="education-section">
                <h2>Education</h2>
                <label for="Matriculation">Matriculation:</label>
                <input type="text" id="Matriculation" placeholder="Enter your school">
        
                <label for="Intermediate">Intermediate:</label>
                <input type="text" id="Intermediate" placeholder="Enter your college">
        
                <!-- <label for="Graduation">Graduation:</label>
                <input type="date" id="Graduation" placeholder="Select graduation date"> -->
            </section>
        </div>

        <div class="container-work">
            <section id="work-experience-section">
                <h2>Work Experience</h2>
                <label for="SALES AGENT">Job Title:</label>
                <input type="text" id="SALES AGENT" placeholder="SALES AGENT">
        
                <label for="MR SOLUTION">Company Name:</label>
                <input type="text" id="MR SOLUTION" placeholder="MR SOLUTION">
        
                <label for="2 MAY 2024">Start Date:</label>
                <input type="2 MAY 2024" id="2 MAY 2024">
        
                <label for="10 AUG 2024">End Date:</label>
                <input type="10 AUG 2024" id="10 AUG 2024">
            </section>
        </div>

        <button onclick="generateResume()">Generate Resume</button>
    </div>

    <script src="app.js"></script>
</body>
